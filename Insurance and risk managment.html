        /* General styles */
        body {
            background-color: white;

        }

        header {

        /* Cube styles */
        .cube-container {
            position: absolute; /* Position absolute to place it at the bottom center */
            bottom: 20px; /* Distance from the bottom */
            left: 50%; /* Center horizontally */
            transform: translateX(-50%); /* Adjust to center */
            width: 100px;
            height: 100px;
            perspective: 800px; /* Perspective for the cube */
        }

        .cube {
            position: absolute;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            animation: rotateCube 10s infinite linear; /* Rotate animation */
        }

        .cube-face {
            position: absolute;
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, rgba(0, 255, 0, 0.8), rgba(0, 0, 255, 0.8)); /* Gradient color */
            border: 1px solid rgba(0, 0, 0, 0.5); /* Border for depth */
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.5), 0 0 20px rgba(0, 0, 255, 0.5); /* Shining effect */
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            color: white;
            text-align: center;
            padding: 10px;
            box-sizing: border-box;
        }

        /* Positioning the cube faces */
        .cube-face.front  { transform: translateZ(50px); }
        .cube-face.back   { transform: rotateY(180deg) translateZ(50px); }
        .cube-face.left   { transform: rotateY(-90deg) translateZ(50px); }
        .cube-face.right  { transform: rotateY(90deg) translateZ(50px); }
        .cube-face.top    { transform: rotateX(90deg) translateZ(50px); }
        .cube-face.bottom  { transform: rotateX(-90deg) translateZ(50px); }

        @keyframes rotateCube {
            from { transform: rotateX(0) rotateY(0); }
            to { transform: rotateX(360deg) rotateY(360deg); }
        }
    </style>
